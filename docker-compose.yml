services:
  mongo:
    image: mongo:7
    profiles:
      - dev
    restart: unless-stopped
    ports:
      - "${MUSICFLOW_MONGO_PORT:-27017}:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    profiles:
      - prod
    build:
      context: ./musicflow_backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./musicflow_backend/.env.prod
    command: sh -c "npm start"
    ports:
      - "${MUSICFLOW_BACKEND_PROD_PORT:-5000}:5000"

  backend_dev:
    image: node:20-alpine
    profiles:
      - dev
    working_dir: /app
    restart: unless-stopped
    env_file:
      - ./musicflow_backend/.env.dev
    depends_on:
      - mongo
    command: sh -c "npm install && npm run dev"
    environment:
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./musicflow_backend:/app
      - backend_node_modules:/app/node_modules
    ports:
      - "${MUSICFLOW_BACKEND_DEV_PORT:-5001}:5001"

  web:
    profiles:
      - prod
    build:
      context: ./musicflow_web
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${MUSICFLOW_WEB_PROD_PORT:-8080}:80"

  web_dev:
    image: node:20-alpine
    profiles:
      - dev
    working_dir: /app
    restart: unless-stopped
    depends_on:
      - backend_dev
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_API_URL: "/api"
      VITE_PROXY_TARGET: "http://backend_dev:5001"
    volumes:
      - ./musicflow_web:/app
      - web_node_modules:/app/node_modules
    ports:
      - "${MUSICFLOW_WEB_DEV_PORT:-5173}:5173"

volumes:
  mongo_data:
  backend_node_modules:
  web_node_modules:

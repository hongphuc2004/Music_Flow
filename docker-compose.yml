services:
  mongo:
    image: mongo:7
    container_name: musicflow_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    container_name: musicflow_backend
    profiles:
      - prod
    build:
      context: ./musicflow_backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - mongo
    ports:
      - "5000:5000"

  backend_dev:
    image: node:20-alpine
    container_name: musicflow_backend_dev
    profiles:
      - dev
    working_dir: /app
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - mongo
    command: sh -c "npm install && npm run dev"
    environment:
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./musicflow_backend:/app
      - backend_node_modules:/app/node_modules
    ports:
      - "5001:5001"

  web:
    container_name: musicflow_web
    profiles:
      - prod
    build:
      context: ./musicflow_web
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"

  web_dev:
    image: node:20-alpine
    container_name: musicflow_web_dev
    profiles:
      - dev
    working_dir: /app
    restart: unless-stopped
    depends_on:
      - backend_dev
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_PROXY_TARGET: "http://backend_dev:5001"
    volumes:
      - ./musicflow_web:/app
      - web_node_modules:/app/node_modules
    ports:
      - "5173:5173"

volumes:
  mongo_data: 
  backend_node_modules:
  web_node_modules: